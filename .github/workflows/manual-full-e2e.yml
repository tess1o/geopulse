name: Manual Full E2E

on:
  workflow_dispatch:

concurrency:
  group: manual-full-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-e2e-tests:
    name: Full E2E Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start E2E environment
        run: |
          docker compose -f tests/docker-compose.e2e.yml up -d geopulse-postgres-e2e geopulse-backend-e2e geopulse-ui-e2e

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for backend to be ready..."
          timeout 120 bash -c 'until curl -f http://localhost:8081/api/health; do echo "Waiting..."; sleep 5; done'

          echo "Waiting for frontend to be ready..."
          timeout 60 bash -c 'until curl -f http://localhost:5556; do echo "Waiting..."; sleep 5; done'

          echo "All services are ready!"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install Playwright dependencies
        run: |
          cd tests
          npm ci
          npx playwright install --with-deps chromium

      - name: Run full E2E test suite (RASTER + VECTOR)
        run: |
          cd tests
          npx playwright test --project=chromium --project=chromium-vector
        env:
          BASE_URL: http://localhost:5556
          PLAYWRIGHT_WORKERS: 4
          CI: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-manual-full-report
          path: tests/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-manual-full-results
          path: tests/test-results/
          retention-days: 14

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manual-test-videos
          path: tests/test-results/**/*.webm
          retention-days: 14

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manual-test-screenshots
          path: tests/test-results/**/*.png
          retention-days: 14

      - name: Show environment logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker logs geopulse-backend-e2e || true
          echo ""
          echo "=== Frontend logs ==="
          docker logs geopulse-ui-e2e || true
          echo ""
          echo "=== Database logs ==="
          docker logs geopulse-postgres-e2e || true

      - name: Cleanup
        if: always()
        run: |
          docker compose -f tests/docker-compose.e2e.yml down -v || echo "Cleanup failed but continuing"
          docker system prune -f || true
