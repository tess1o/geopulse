quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:}
quarkus.http.test-port=0
quarkus.http.test-ssl-port=0
quarkus.smallrye-openapi.enabled=false
quarkus.smallrye-openapi.store-schema-directory=
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.statistics=true
smallrye.jwt.sign.key.location=classpath:keys/jwt-private-key.pem
mp.jwt.verify.publickey.location=classpath:keys/jwt-public-key.pem
smallrye.jwt.new-token.issuer=https://geopulse.tessio.test
smallrye.jwt.new-token.lifespan=1800
geopulse.import.scheduler.enabled=false
quarkus.scheduler.enabled=false
# Test mode - return tokens in login response for compatibility
geopulse.test.mode=true
# JWT configuration for tests - DualTokenAuthenticationMechanism handles both
mp.jwt.verify.issuer=https://geopulse.tessio.test
quarkus.keycloak.devservices.enabled=false
geopulse.ai.encryption.key.location=classpath:keys/ai-encryption-key.txt
# Disable external GeoNames startup imports in tests to keep runs deterministic
geopulse.geonames.import.enabled=false
geopulse.geonames.country-import.enabled=false
geopulse.warmup.enabled=false
