{{- if .Values.httproute.enabled }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "geopulse.fullname" . }}
  labels:
    {{- include "geopulse.labels" . | nindent 4 }}
  {{- with .Values.httproute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.httproute.parentName }}
  parentRefs:
    - name: {{ .Values.httproute.parentName }}
      {{- with .Values.httproute.sectionName }}
      sectionName: {{ . }}
      {{- end }}
      {{- if .Values.httproute.namespace }}
      namespace: {{ .Values.httproute.namespace }}
      {{- else }}
      namespace: {{ .Release.Namespace }}
      {{- end }}
  {{- end }}
  {{- if .Values.httproute.hostname }}
  hostnames:
    - {{ .Values.httproute.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "geopulse.fullname" . }}-frontend
          port: {{ .Values.frontend.service.port }}
          kind: Service
{{- end }}
